blueprint:
  name: License Plate AI Capture + Match Actions 
  description: >
    Capture multiple camera snapshots, use AI Task to extract a license plate,
    store it in an input_text, and run actions if it matches a known list.
    Snapshot timing automatically adapts to day/night using sun.sun.

    Improvements:
    - AI returns up to 3 candidates (best first) from all snapshots.
    - Matching supports fuzzy compare: allow N mismatching characters (default 1).
    - Plate length is enforced (default 7) to reduce false positives.
  domain: automation

  input:
    camera_device:
      name: Camera
      selector:
        entity:
          domain: camera

    trigger_sensor:
      name: Trigger binary sensor(s)
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    condition_auto:
      name: Conditions to run
      default: []
      selector:
        condition: {}

    num_snapshots:
      name: Number of snapshots
      selector:
        number:
          min: 1
          max: 5
          step: 1
      default: 3

    snapshot_delay_day_ms:
      name: Snapshot delay – Day (ms)
      selector:
        number:
          min: 100
          max: 3000
          step: 100
          unit_of_measurement: ms
      default: 400

    snapshot_delay_night_ms:
      name: Snapshot delay – Night (ms)
      selector:
        number:
          min: 200
          max: 5000
          step: 100
          unit_of_measurement: ms
      default: 1200

    cooldown_minutes:
      name: Cooldown (minutes)
      selector:
        number:
          min: 0
          max: 10
          step: 1
      default: 2

    ai_task_entity:
      name: AI Task entity
      selector:
        entity:
          domain: ai_task

    ai_prompt:
      name: AI Prompt
      selector:
        text:
          multiline: true
      default: >-
        You are given multiple sequential camera snapshots.
        Choose the clearest image(s) and extract the vehicle license plate.

        Return EITHER:
        - ONE best plate, or
        - up to THREE candidates separated by commas (best first)

        Use ONLY letters/numbers in each plate (no spaces or hyphens).
        If not readable, return UNKNOWN.

    plate_storage:
      name: Plate storage (input_text)
      selector:
        entity:
          domain: input_text

    known_plates:
      name: Known plates list
      description: Comma or newline separated list of known plates
      selector:
        text:
          multiline: true
      default: ""

    expected_plate_length:
      name: Expected plate length
      description: Typical DK plates are 7 characters. Used to reduce false positives.
      selector:
        number:
          min: 4
          max: 10
          step: 1
      default: 7

    allowed_mismatches:
      name: Allowed mismatches (characters)
      description: How many characters may differ and still count as a match.
      selector:
        number:
          min: 0
          max: 3
          step: 1
      default: 1

    on_match_actions:
      name: Actions when plate matches
      default: []
      selector:
        action: {}

    on_no_match_actions:
      name: Actions when plate does not match
      default: []
      selector:
        action: {}

trigger:
  - platform: state
    entity_id: !input trigger_sensor
    to: "on"

condition: !input condition_auto

variables:
  # Inputs exposed for templating
  camera_device: !input camera_device
  num_snapshots: !input num_snapshots
  cooldown_minutes: !input cooldown_minutes
  snapshot_delay_day_ms: !input snapshot_delay_day_ms
  snapshot_delay_night_ms: !input snapshot_delay_night_ms
  ai_prompt: !input ai_prompt
  known_plates: !input known_plates
  expected_plate_length: !input expected_plate_length
  allowed_mismatches: !input allowed_mismatches

  # Derived
  camera_name: "{{ state_attr(camera_device, 'friendly_name') or camera_device }}"
  camera_path: "{{ camera_name | lower | replace(' ', '_') | replace('.', '_') }}"

  snapshot_delay_ms: >-
    {% if states('sun.sun') == 'above_horizon' %}
      {{ snapshot_delay_day_ms }}
    {% else %}
      {{ snapshot_delay_night_ms }}
    {% endif %}

  # Known plates list -> list of strings (no split filter; use Python .split)
  known_list: >-
    {% set s = (known_plates
      | upper
      | replace(' ', '')
      | replace('-', '')
      | replace('\r', '')
      | replace('\n', ',')
    ) %}
    {% set ns = namespace(out=[]) %}
    {% for x in s.split(',') %}
      {% set y = x.strip() %}
      {% if y != '' %}
        {% set ns.out = ns.out + [y] %}
      {% endif %}
    {% endfor %}
    {{ ns.out }}

action:
  # 1️⃣ Capture snapshots
  - repeat:
      count: "{{ num_snapshots }}"
      sequence:
        - service: camera.snapshot
          target:
            entity_id: !input camera_device
          data:
            filename: "/media/snapshots/{{ camera_path }}_lp_{{ repeat.index }}.jpg"
        - delay:
            milliseconds: "{{ snapshot_delay_ms | int }}"

  - delay: "00:00:02"

  # 2️⃣ AI Task – extract license plate (IMPORTANT: entity_id must be in data)
  - service: ai_task.generate_data
    data:
      entity_id: !input ai_task_entity
      task_name: license_plate_extraction
      instructions: "{{ ai_prompt }}"
      structure:
        plate:
          description: License plate text (or up to 3 comma-separated candidates) or UNKNOWN
          selector:
            text: {}
      attachments: >-
        {% set ns = namespace(images=[]) %}
        {% for i in range(1, num_snapshots + 1) %}
          {% set p = "media-source://media_source/local/snapshots/" ~ camera_path ~ "_lp_" ~ i ~ ".jpg" %}
          {% set ns.images = ns.images + [{"media_content_id": p, "media_content_type": "image/jpeg"}] %}
        {% endfor %}
        {{ ns.images }}
    response_variable: lp_result

  # 3️⃣ Normalize candidates and store best
  - variables:
      plate_candidates: >-
        {% set raw = lp_result.data.plate | default('UNKNOWN') %}
        {% set cleaned = (raw | upper | replace(' ', '') | replace('-', '') | replace('\r', '')) %}
        {% set s = cleaned.replace('\n', ',').replace(';', ',') %}
        {% set ns = namespace(out=[]) %}
        {% for x in s.split(',') %}
          {% set y = x.strip() %}
          {% if y != '' %}
            {% set ns.out = ns.out + [y] %}
          {% endif %}
        {% endfor %}
        {{ ns.out }}

      plate_norm: >-
        {% set ns = namespace(best='UNKNOWN') %}
        {% set L = expected_plate_length | int %}
        {% for a in plate_candidates %}
          {% if a not in ['UNKNOWN',''] and (a | length) == L %}
            {% set ns.best = a %}
            {% break %}
          {% endif %}
        {% endfor %}
        {{ ns.best }}

  - service: input_text.set_value
    target:
      entity_id: !input plate_storage
    data:
      value: "{{ plate_norm }}"

  # 4️⃣ Fuzzy compare and trigger actions
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {% set allow = allowed_mismatches | int %}
              {% set L = expected_plate_length | int %}
              {% set ok = namespace(found=false) %}

              {% for a in plate_candidates %}
                {% if a not in ['UNKNOWN',''] and (a|length) == L %}
                  {% for b in known_list %}
                    {% if (b|length) == L %}
                      {% set ns = namespace(mis=0) %}
                      {% for i in range(L) %}
                        {% if a[i] != b[i] %}
                          {% set ns.mis = ns.mis + 1 %}
                          {% if ns.mis > allow %}
                            {% break %}
                          {% endif %}
                        {% endif %}
                      {% endfor %}
                      {% if ns.mis <= allow %}
                        {% set ok.found = true %}
                        {% break %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                {% endif %}
                {% if ok.found %}{% break %}{% endif %}
              {% endfor %}

              {{ ok.found }}
        sequence: !input on_match_actions
    default: !input on_no_match_actions

  # 5️⃣ Cooldown
  - delay:
      seconds: "{{ (cooldown_minutes | int) * 60 }}"

mode: single
